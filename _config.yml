theme: jekyll-theme-chirpy

lang: pt-BR
timezone: America/Sao_Paulo

title: Nícolas Brandão
tagline: Infraestrutura de redes, segurança e tecnologia.
description: Tutoriais e pesquisas sobre infraestrutura de redes, segurança e virtualização.

url: "https://nicolasbrandaoc.github.io"

github:
  username: nicolasbrandaoc

social:
  name: Nícolas Brandão
  email: nicolascbrandao@icloud.com
  links:
    - https://github.com/nicolasbrandaoc
    - https://www.linkedin.com/in/nicolasbrandaoc

avatar: "/assets/img/avatar.svg"

toc: true

comments:
  active: ""

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
